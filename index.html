  <style>
    :root {
      --bg: #FFFFFF;
      --text: #111111;
      --text-mid: #555555;
      --text-light: #999999;
      --accent: #C4896E;
      --ai: #7C6FA0;
      --rule: #E2E2E2;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --font-heading: 'DM Serif Display', Georgia, serif;
      --font-body: 'Inter', system-ui, -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { font-size: 16px; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      overflow: hidden;
    }

    img { display: block; }

    .app { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }

    /* ---- Left index rail ---- */
    .rail {
      border-right: 1px solid var(--rule);
      padding: 2.25rem 0 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s var(--ease-out);
    }

    /* Mobile top bar + drawer scrim (hidden on desktop) */
    .mtopbar { display: none; }
    .scrim { display: none; }
    .rail__brand { padding: 0 2rem 1.25rem; }
    .rail__name { font-family: var(--font-heading); font-size: 1.6rem; line-height: 1.1; }
    .rail__tag { color: var(--text-light); font-size: 0.85rem; margin-top: 0.35rem; }

    .rail__group {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-light); font-weight: 600; padding: 1.5rem 2rem 0.5rem;
    }
    .rail__item {
      display: flex; align-items: baseline; gap: 0.7rem;
      padding: 0.6rem 2rem; cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s var(--ease), border-color 0.15s var(--ease);
    }
    .rail__item:hover { background: rgba(0, 0, 0, 0.03); }
    .rail__item.is-active { background: rgba(0, 0, 0, 0.05); border-left-color: var(--text); }
    .rail__item.is-active.is-ai { border-left-color: var(--ai); }
    .rail__n { font-size: 0.72rem; color: var(--text-light); font-weight: 500; flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .rail__label { font-size: 0.85rem; color: var(--text-mid); font-weight: 500; line-height: 1.3; }
    .rail__item.is-active .rail__label { color: var(--text); }
    .rail__item.is-active.is-ai .rail__label { color: var(--ai); }
    .rail__foot { margin-top: auto; padding: 1.5rem 2rem 0; color: var(--text-light); font-size: 0.75rem; }

    /* ---- Right detail pane ---- */
    .pane { overflow-y: auto; padding: 2.25rem clamp(2rem, 5vw, 5rem) 5rem; }
    .pane__inner { max-width: 760px; margin: 0 auto; animation: fade 0.45s var(--ease-out); }
    @keyframes fade { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    .pane__title {
      font-family: var(--font-heading); font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 400; letter-spacing: -0.015em; line-height: 1.08; margin: 0 0 0.75rem;
    }
    .pane__desc { font-size: 1.15rem; color: var(--text-mid); line-height: 1.6; max-width: 36rem; }
    .pane__role {
      font-size: 0.75rem; color: var(--text-light); text-transform: uppercase;
      letter-spacing: 0.06em; font-weight: 500; margin-top: 1rem;
    }

    .pane__gal { margin: 2.5rem 0; }

    .pane__facts { display: grid; grid-template-columns: 1fr 1fr; gap: 0 2.5rem; border-top: 1px solid var(--rule); }
    .pane__fact { padding: 1.5rem 0; border-bottom: 1px solid var(--rule); }
    .pane__fact h4 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-light); font-weight: 600; margin-bottom: 0.4rem; }
    .pane__fact p { font-size: 0.95rem; color: var(--text-mid); line-height: 1.6; }
    .pane__fact ul { list-style: none; display: grid; gap: 0.4rem; }
    .pane__fact li { font-size: 0.92rem; color: var(--text-mid); padding-left: 1.1rem; position: relative; }
    .pane__fact li::before { content: '-'; position: absolute; left: 0; color: var(--accent); }

    .pane__ctas { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .pane__cta {
      display: inline-flex; align-items: center; gap: 0.4rem; margin-top: 2rem;
      font-size: 0.95rem; font-weight: 500; color: var(--ai); text-decoration: none;
      border-bottom: 1px solid transparent; padding-bottom: 2px; transition: border-color 0.15s var(--ease);
    }
    .pane__cta:hover { border-bottom-color: var(--ai); }

    /* ---- Split Edge carousel ---- */
    .gal { position: relative; border-radius: 12px; overflow: hidden; background: #f2f1ef;
      box-shadow: 0 2px 8px rgba(20, 18, 16, 0.05), 0 18px 44px rgba(20, 18, 16, 0.1); }
    .gal__vp { overflow: hidden; transition: height 0.5s var(--ease-out); }
    .gal__track { display: flex; align-items: flex-start; transition: transform 0.6s var(--ease-out); }
    .gal__track img { flex: 0 0 100%; width: 100%; height: auto; cursor: zoom-in; }

    .gal__arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(28, 25, 22, 0.42);
      backdrop-filter: blur(14px) saturate(140%); -webkit-backdrop-filter: blur(14px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.22);
      display: flex; align-items: center; justify-content: center;
      color: #fff; cursor: pointer; box-shadow: 0 4px 18px rgba(0, 0, 0, 0.28);
      transition: background 0.25s var(--ease), transform 0.25s var(--ease-out), border-color 0.25s var(--ease);
      z-index: 2;
    }
    .gal__arrow:hover { background: rgba(28, 25, 22, 0.62); border-color: rgba(255, 255, 255, 0.4); transform: translateY(-50%) scale(1.07); }
    .gal__arrow:active { transform: translateY(-50%) scale(0.96); }
    .gal__arrow svg { width: 18px; height: 18px; }
    .gal__arrow--prev { left: 1rem; }
    .gal__arrow--next { right: 1rem; }

    .gal__dots {
      position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 0.45rem;
      background: rgba(20, 18, 16, 0.45); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      padding: 0.45rem 0.7rem; border-radius: 100px; z-index: 2;
    }
    .gal__dot { width: 6px; height: 6px; border-radius: 100px; background: rgba(255, 255, 255, 0.5);
      transition: width 0.4s var(--ease-out), background 0.3s var(--ease); cursor: pointer; }
    .gal__dot.is-active { width: 20px; background: #fff; }

    /* ---- Lightbox ---- */
    .lightbox {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(10, 10, 10, 0.96);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }
    .lightbox.active { opacity: 1; visibility: visible; }
    .lightbox__img { max-width: 88vw; max-height: 88vh; object-fit: contain; }
    .lightbox__close, .lightbox__prev, .lightbox__next {
      position: absolute; background: none; border: none; color: rgba(255, 255, 255, 0.5);
      cursor: pointer; padding: 0.75rem; display: flex; align-items: center; justify-content: center;
      transition: color 0.15s ease;
    }
    .lightbox__close:hover, .lightbox__prev:hover, .lightbox__next:hover { color: #fff; }
    .lightbox__close { top: 1.5rem; right: 1.5rem; }
    .lightbox__prev { left: 1.5rem; top: 50%; transform: translateY(-50%); }
    .lightbox__next { right: 1.5rem; top: 50%; transform: translateY(-50%); }

    @media (max-width: 760px) {
      body { overflow: auto; }
      .app { grid-template-columns: 1fr; height: auto; }

      /* Compact sticky top bar */
      .mtopbar {
        display: flex; align-items: center; gap: 0.75rem;
        position: sticky; top: 0; z-index: 40;
        padding: 0.8rem 1.1rem;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--rule);
      }
      .mtopbar__btn {
        width: 40px; height: 40px; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        background: none; border: 1px solid var(--rule); border-radius: 9px;
        color: var(--text); cursor: pointer;
      }
      .mtopbar__btn svg { width: 20px; height: 20px; }
      .mtopbar__brand { font-family: var(--font-heading); font-size: 1.2rem; line-height: 1; }
      .mtopbar__current {
        margin-left: auto; font-size: 0.78rem; color: var(--text-light);
        font-weight: 500; max-width: 45%; overflow: hidden;
        text-overflow: ellipsis; white-space: nowrap;
      }

      /* Rail becomes an off-canvas drawer */
      .rail {
        position: fixed; top: 0; left: 0; z-index: 60;
        width: min(82vw, 320px); height: 100vh;
        background: var(--bg);
        border-right: 1px solid var(--rule); border-bottom: none;
        transform: translateX(-100%);
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.18);
      }
      .rail.open { transform: none; }
      .rail__foot { display: block; }

      .scrim {
        display: block; position: fixed; inset: 0; z-index: 55;
        background: rgba(10, 10, 10, 0.4);
        opacity: 0; visibility: hidden;
        transition: opacity 0.25s ease, visibility 0.25s ease;
      }
      .scrim.show { opacity: 1; visibility: visible; }

      .pane { padding: 1.5rem 1.25rem 4rem; }
      .pane__facts { grid-template-columns: 1fr; }
      .gal__arrow { width: 38px; height: 38px; }
      .gal__arrow--prev { left: 0.6rem; }
      .gal__arrow--next { right: 0.6rem; }
    }
  </style>
</head>

    const PG_PREV = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>';
    const PG_NEXT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';

    function buildGallery(images) {
      const g = document.createElement('div');
      g.className = 'gal';
      const slides = images.map(([src, alt]) => `<img src="${src}" alt="${alt}">`).join('');
      g.innerHTML = `
        <div class="gal__vp"><div class="gal__track">${slides}</div></div>
        <button class="gal__arrow gal__arrow--prev" aria-label="Previous image">${PG_PREV}</button>
        <button class="gal__arrow gal__arrow--next" aria-label="Next image">${PG_NEXT}</button>
        <div class="gal__dots">${images.map((_, i) => `<span class="gal__dot${i === 0 ? ' is-active' : ''}"></span>`).join('')}</div>`;
      return g;
    }

    function initGallery(gallery) {
      const imgs = Array.from(gallery.querySelectorAll('img'));
      if (imgs.length < 2) return;
      const track = gallery.querySelector('.gal__track');
      const vp = gallery.querySelector('.gal__vp');
      const dots = Array.from(gallery.querySelectorAll('.gal__dot'));
      let index = 0, timer = null, inView = false, hovering = false;
      const total = imgs.length, DUR = 5000;

      function setH() { const h = imgs[index].clientHeight; if (h) vp.style.height = h + 'px'; }
      function render() {
        track.style.transform = `translateX(-${index * 100}%)`;
        dots.forEach((d, i) => d.classList.toggle('is-active', i === index));
        setH();
      }
      function go(i) { index = (i + total) % total; render(); }
      function stop() { if (timer) { clearInterval(timer); timer = null; } }
      function play() { stop(); if (inView && !hovering) timer = setInterval(() => go(index + 1), DUR); }

      gallery.querySelector('.gal__arrow--prev').addEventListener('click', () => { go(index - 1); play(); });
      gallery.querySelector('.gal__arrow--next').addEventListener('click', () => { go(index + 1); play(); });
      dots.forEach((d, i) => d.addEventListener('click', () => { go(i); play(); }));
      gallery.addEventListener('mouseenter', () => { hovering = true; stop(); });
      gallery.addEventListener('mouseleave', () => { hovering = false; play(); });

      const io = new IntersectionObserver(e => { inView = e[0].isIntersecting; play(); }, { threshold: 0.3 });
      io.observe(gallery);
      imgs.forEach(img => img.addEventListener('load', () => { if (imgs[index] === img) setH(); }));
      window.addEventListener('resize', setH);
      render();
      if (imgs[index].complete) setH();
    }

    // ── Lightbox ──────────────────────────────
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    let lbImages = [], lbIndex = 0;

    function openLightbox(images, i) {
      lbImages = images; lbIndex = i;
      lightboxImg.src = images[i][0];
      lightboxImg.alt = images[i][1] || '';
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() { lightbox.classList.remove('active'); document.body.style.overflow = ''; }
    function lbShow(d) {
      lbIndex = (lbIndex + d + lbImages.length) % lbImages.length;
      lightboxImg.src = lbImages[lbIndex][0];
      lightboxImg.alt = lbImages[lbIndex][1] || '';
    }
    lightbox.querySelector('.lightbox__close').addEventListener('click', closeLightbox);
    lightbox.querySelector('.lightbox__prev').addEventListener('click', () => lbShow(-1));
    lightbox.querySelector('.lightbox__next').addEventListener('click', () => lbShow(1));
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') lbShow(-1);
      if (e.key === 'ArrowRight') lbShow(1);
    });

    // ── Render rail ──────────────────────────────
    const railList = document.getElementById('railList');
    let designAdded = false, aiAdded = false;
    PROJECTS.forEach((p, i) => {
      if (!p.ai && !designAdded) {
        const g = document.createElement('div'); g.className = 'rail__group'; g.textContent = 'Design Work';
        railList.appendChild(g); designAdded = true;
      }
      if (p.ai && !aiAdded) {
        const g = document.createElement('div'); g.className = 'rail__group'; g.textContent = 'AI Projects';
        railList.appendChild(g); aiAdded = true;
      }
      const item = document.createElement('div');
      item.className = 'rail__item' + (p.ai ? ' is-ai' : '');
      item.innerHTML = `<span class="rail__n">${p.num}</span><span class="rail__label">${p.title}</span>`;
      item.addEventListener('click', () => select(i, true));
      railList.appendChild(item);
    });
    const items = Array.from(railList.querySelectorAll('.rail__item'));

    // ── Mobile drawer ──────────────────────────────
    const rail = document.querySelector('.rail');
    const scrim = document.getElementById('scrim');
    const menuBtn = document.getElementById('menuBtn');
    const mCurrent = document.getElementById('mCurrent');
    function openMenu() { rail.classList.add('open'); scrim.classList.add('show'); menuBtn.setAttribute('aria-expanded', 'true'); }
    function closeMenu() { rail.classList.remove('open'); scrim.classList.remove('show'); menuBtn.setAttribute('aria-expanded', 'false'); }
    menuBtn.addEventListener('click', () => { rail.classList.contains('open') ? closeMenu() : openMenu(); });
    scrim.addEventListener('click', closeMenu);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); });

    // ── Analytics state ──────────────────────────────
    let current = -1;
    let viewStart = 0;
    let aiSectionFired = false;

    function logTimeSpent(useBeacon) {
      if (current < 0 || !viewStart) return;
      const seconds = Math.round((Date.now() - viewStart) / 1000);
      if (seconds >= 3) {
        const p = PROJECTS[current];
        const params = { project_name: p.title, seconds_spent: seconds };
        if (useBeacon) params.transport_type = 'beacon';
        gtag('event', 'project_time_spent', params);
      }
    }

    // ── Select a project ──────────────────────────────
    function select(i, userInitiated) {
      // time spent on the project we're leaving
      logTimeSpent(false);

      const p = PROJECTS[i];
      items.forEach((it, idx) => it.classList.toggle('is-active', idx === i));

      if (userInitiated) {
        gtag('event', 'nav_click', {
          project_name: p.title,
          project_type: p.ai ? 'ai' : 'design',
          nav_surface: 'rail'
        });
      }
      if (p.ai && !aiSectionFired) {
        gtag('event', 'ai_section_viewed');
        aiSectionFired = true;
      }

      const pane = document.getElementById('pane');
      pane.className = 'pane__inner' + (p.ai ? ' is-ai' : '');

      let facts = '';
      if (!p.ai) {
        facts = `
          <div class="pane__facts">
            <div class="pane__fact"><h4>Overview</h4><p>${p.overview}</p></div>
            <div class="pane__fact"><h4>Challenge</h4><p>${p.challenge}</p></div>
            <div class="pane__fact"><h4>Solution</h4><p>${p.solution}</p></div>
            <div class="pane__fact"><h4>Results</h4><ul>${p.results.map(r => `<li>${r}</li>`).join('')}</ul></div>
          </div>`;
      } else {
        const cs = p.caseStudy ? `<a class="pane__cta" data-btn="Case Study" href="${p.caseStudy}" target="_blank" rel="noopener">Case study →</a>` : '';
        facts = `<div class="pane__ctas"><a class="pane__cta" data-btn="Visit project" href="${p.cta}" target="_blank" rel="noopener">Visit project →</a>${cs}</div>`;
      }

      pane.innerHTML = `
        <h2 class="pane__title">${p.title}</h2>
        <p class="pane__desc">${p.desc}</p>
        <p class="pane__role">${p.role}</p>
        <div class="pane__gal"></div>
        ${facts}`;

      // gallery
      const gal = buildGallery(p.images);
      pane.querySelector('.pane__gal').appendChild(gal);
      initGallery(gal);

      // lightbox + analytics on gallery images
      const galImgs = Array.from(gal.querySelectorAll('.gal__track img'));
      galImgs.forEach((img, idx) => {
        img.addEventListener('click', () => {
          openLightbox(p.images, idx);
          gtag('event', 'lightbox_open', { project_name: p.title, image_index: idx + 1 });
        });
      });

      // CTA analytics
      pane.querySelectorAll('.pane__cta').forEach(cta => {
        cta.addEventListener('click', () => {
          gtag('event', 'cta_click', {
            project_name: p.title,
            button_text: cta.dataset.btn,
            link_url: cta.href
          });
        });
      });

      document.querySelector('.pane').scrollTop = 0;
      if (mCurrent) mCurrent.textContent = p.title;
      closeMenu();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      current = i;
      viewStart = Date.now();
    }

    // flush time on unload
    window.addEventListener('pagehide', () => logTimeSpent(true));

    select(0, false);
  </script>
</body>

</html>
