<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout · Two-Pane App - ran-portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+Pro:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="layout-shared.css">
  <style>
    body { overflow: hidden; }

    .app { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }

    /* ---- Left index rail ---- */
    .rail {
      border-right: 1px solid var(--rule);
      padding: 2.25rem 0;
      overflow-y: auto;
      background: var(--bg);
    }
    .rail__brand { padding: 0 2rem 1.75rem; }
    .rail__name { font-family: var(--font-heading); font-size: 1.5rem; font-weight: 600; letter-spacing: -0.01em; }
    .rail__tag { color: var(--text-light); font-size: 0.85rem; margin-top: 0.25rem; }

    .rail__group {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-light); font-weight: 600; padding: 1.5rem 2rem 0.5rem;
    }
    .rail__item {
      display: flex; align-items: baseline; gap: 0.7rem;
      padding: 0.6rem 2rem; cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s var(--ease), border-color 0.15s var(--ease);
    }
    .rail__item:hover { background: rgba(0, 0, 0, 0.03); }
    .rail__item.is-active { background: rgba(0, 0, 0, 0.05); border-left-color: var(--text); }
    .rail__item.is-active.is-ai { border-left-color: var(--ai); }
    .rail__n { font-size: 0.72rem; color: var(--text-light); font-weight: 500; flex-shrink: 0; }
    .rail__label { font-size: 0.85rem; color: var(--text-mid); font-weight: 500; line-height: 1.3; }
    .rail__item.is-active .rail__label { color: var(--text); }
    .rail__item.is-active.is-ai .rail__label { color: var(--ai); }

    /* ---- Right detail pane ---- */
    .pane { overflow-y: auto; padding: 2.25rem clamp(2rem, 5vw, 5rem) 5rem; }
    .pane__inner { max-width: 760px; margin: 0 auto; animation: fade 0.45s var(--ease-out); }
    @keyframes fade { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    .pane__num { font-family: var(--font-heading); font-weight: 600; color: var(--accent); font-size: 1rem; }
    .pane__inner.is-ai .pane__num { color: var(--ai); }
    .pane__title {
      font-family: var(--font-heading); font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 600; letter-spacing: -0.025em; line-height: 1.08; margin: 0 0 0.75rem;
    }
    .pane__desc { font-size: 1.15rem; color: var(--text-mid); line-height: 1.6; max-width: 36rem; }
    .pane__role { font-size: 0.78rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; margin-top: 1rem; }

    .pane__gal { margin: 2.5rem 0; }

    .pane__facts { display: grid; grid-template-columns: 1fr 1fr; gap: 0 2.5rem; border-top: 1px solid var(--rule); }
    .pane__fact { padding: 1.5rem 0; border-bottom: 1px solid var(--rule); }
    .pane__fact h4 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-light); font-weight: 600; margin-bottom: 0.4rem; }
    .pane__fact p { font-size: 0.95rem; color: var(--text-mid); line-height: 1.6; }
    .pane__fact ul { list-style: none; display: grid; gap: 0.4rem; }
    .pane__fact li { font-size: 0.92rem; color: var(--text-mid); padding-left: 1.1rem; position: relative; }
    .pane__fact li::before { content: '-'; position: absolute; left: 0; color: var(--accent); }

    .pane__cta {
      display: inline-flex; align-items: center; gap: 0.4rem; margin-top: 2rem;
      font-size: 0.95rem; font-weight: 600; color: var(--ai); text-decoration: none;
      border-bottom: 1px solid currentColor; padding-bottom: 2px;
    }

    .pane__nav { display: flex; justify-content: space-between; margin-top: 3.5rem; border-top: 1px solid var(--rule); padding-top: 1.5rem; }
    .pane__navbtn { background: none; border: none; cursor: pointer; font-family: inherit; color: var(--text-mid); font-size: 0.9rem; }
    .pane__navbtn:hover { color: var(--text); }
    .pane__navbtn:disabled { opacity: 0.3; cursor: default; }
    .pane__navbtn small { display: block; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-light); }

    @media (max-width: 760px) {
      body { overflow: auto; }
      .app { grid-template-columns: 1fr; height: auto; }
      .rail { border-right: none; border-bottom: 1px solid var(--rule); position: sticky; top: 0; }
      .pane { padding: 2rem 1.5rem 4rem; }
      .pane__facts { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="rail">
      <div class="rail__brand">
        <div class="rail__name">Ran Segal</div>
        <div class="rail__tag">Designing experiences that feel right.</div>
      </div>
      <div id="railList"></div>
    </aside>
    <main class="pane"><div class="pane__inner" id="pane"></div></main>
  </div>

  <script src="layout-data.js"></script>
  <script>
    const railList = document.getElementById('railList');
    let current = 0;

    // build rail
    let lastAi = false;
    PROJECTS.forEach((p, i) => {
      if (p.ai && !lastAi) {
        const g = document.createElement('div');
        g.className = 'rail__group'; g.textContent = 'AI Projects';
        railList.appendChild(g); lastAi = true;
      } else if (!p.ai && i === 0) {
        const g = document.createElement('div');
        g.className = 'rail__group'; g.textContent = 'Design Work';
        railList.appendChild(g);
      }
      const item = document.createElement('div');
      item.className = 'rail__item' + (p.ai ? ' is-ai' : '');
      item.innerHTML = `<span class="rail__n">${p.num}</span><span class="rail__label">${p.title}</span>`;
      item.addEventListener('click', () => select(i));
      railList.appendChild(item);
    });
    const items = Array.from(railList.querySelectorAll('.rail__item'));

    function select(i) {
      current = i;
      const p = PROJECTS[i];
      items.forEach((it, idx) => it.classList.toggle('is-active', idx === i));

      const pane = document.getElementById('pane');
      pane.className = 'pane__inner' + (p.ai ? ' is-ai' : '');

      let facts = '';
      if (!p.ai) {
        facts = `
          <div class="pane__facts">
            <div class="pane__fact"><h4>Overview</h4><p>${p.overview}</p></div>
            <div class="pane__fact"><h4>Challenge</h4><p>${p.challenge}</p></div>
            <div class="pane__fact"><h4>Solution</h4><p>${p.solution}</p></div>
            <div class="pane__fact"><h4>Results</h4><ul>${p.results.map(r => `<li>${r}</li>`).join('')}</ul></div>
          </div>`;
      } else {
        facts = `<a class="pane__cta" href="${p.cta}" target="_blank" rel="noopener">Visit project →</a>`;
      }

      pane.innerHTML = `
        <h2 class="pane__title">${p.title}</h2>
        <p class="pane__desc">${p.desc}</p>
        <p class="pane__role">${p.role}</p>
        <div class="pane__gal"></div>
        ${facts}`;

      const gal = buildGallery(p.images);
      pane.querySelector('.pane__gal').appendChild(gal);
      initGallery(gal);

      document.querySelector('.pane').scrollTop = 0;
    }

    select(0);
  </script>
</body>

</html>
